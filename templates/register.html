{% extends 'base.html' %}
{% block title %} Register {% endblock %}

{% block content %}

<h2 class="mt-4">Register</h2>

{% if message %}
<p style="color:green;">{{ message }}</p>
{% endif %}

<div>
    <form>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Full_Name</label>
            <input type="text" name="f_name" class="form-control" id="exampleInputPassword1">
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" id="exampleInputEmail1">
        </div>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Phone Number</label>
            <input type="tel" name="phone" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Password</label>
            <input type="password" name="pass" class="form-control" id="exampleInputPassword1">
        </div>
        < <button type="submit" class="btn btn-primary">Register</button>
    </form>
</div>

{% endblock %}
