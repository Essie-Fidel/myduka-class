{% extends 'base.html' %}
{% block title %} Stock {% endblock %}

{% block content %}

<h2 class="mt-4">Stock Overview</h2>

<table class="table">
    <tr>
        <th>Name</th>
        <th>Buying Price</th>
        <th>Selling Price</th>
        <th>Stock</th>
    </tr>

    {% for item in stock %}
    <tr>
        <td>{{ item[1] }}</td>
        <td>{{ item[2] }}</td>
        <td>{{ item[3] }}</td>
        <td>{{ item[4] }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
