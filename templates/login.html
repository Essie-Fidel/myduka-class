{% extends 'base.html' %}
{% block title %} Login {% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh;">

    <div class="card shadow-lg bg-dark text-light p-4" style="width: 100%; max-width: 450px;">

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h2 class="fw-bold text-danger">Welcome Back</h2>
            <p class="text-muted">Login to continue to MyDuka</p>
        </div>

        {% if message %}
        <p class="text-danger text-center">{{ message }}</p>
        {% endif %}

        <!-- FORM -->
        <form action="/login" method="POST">

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="pass" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-danger w-100">
                Login
            </button>

        </form>

        <!-- REGISTER LINK -->
        <div class="text-center mt-3">
            <small class="text-muted">
                Don’t have an account?
                <a href="/register" class="text-danger">Register</a>
            </small>
        </div>

    </div>

</div>

{% endblock %}
