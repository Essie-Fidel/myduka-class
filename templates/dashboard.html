{% extends 'base.html' %}
{% block title %} Dashboard {% endblock %}

{% block content %}

<h2 class="mt-4">Dashboard</h2>

<div class="row mt-4">

    <div class="col-md-4">
        <div class="card p-3 bg-light">
            <h4>Total Sales</h4>
            <h2>{{ sales }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 bg-light">
            <h4>Total Products</h4>
            <h2>{{ products }}</h2>
        </div>
    </div>

</div>

<hr>

<h3>Low Stock Products</h3>

<table class="table">
    <tr>
        <th>Name</th>
        <th>Stock</th>
    </tr>

    {% for item in low_stock %}
    <tr>
        <td>{{ item[1] }}</td>
        <td style="color:red;">{{ item[4] }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
