{% extends 'base.html' %}
{% block title %} Sales {% endblock %}

{% block content %}

{% for sale in sales_data %}
<p>{{sales}}</p>
{% endfor %}

<h2 class="mt-4">Sales History</h2>

<div>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
        Add Sales
    </button>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Add a sale</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form method="post" action="/add_sales">
                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label">Product ID</label>
                            <input type="number" name="p_id" class="form-control" id="exampleInputEmail1"
                                aria-describedby="emailHelp">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Quantity</label>
                            <input type="number" name="quantity" class="form-control" id="exampleInputPassword1">
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="submit" class="btn btn-primary">Add sale</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>


<table class="table table-striped">

    <thead>
        <tr>
            <th>Product ID</th>
            <th>Quantity</th>
        </tr>
    </thead>

    <tbody>
        {% for sale in sales %}
        <tr>
            <td>{{ sale[1] }}</td>
            <td>{{ sale[2] }}</td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% endblock %}
